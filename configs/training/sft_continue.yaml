# ============================================================
# SFT Continuation Training (Stage 4b)
# ============================================================
#
# WHY CONTINUE SFT:
#   After Stage 4 SFT, three critical gaps remain:
#     - error_recovery: 0.060 (ZERO training examples existed)
#     - relevance_detection: 0.186 (only 9% no_tool in training)
#     - multi_tool_sequencing: 0.000 (model can't output JSON arrays)
#
#   Rather than starting fresh, we CONTINUE from the SFT checkpoint
#   with AUGMENTED data that fills these gaps. This is more efficient
#   and preserves the skills already learned (tool_selection: 0.96,
#   hallucination_resistance: 1.00).
#
# KEY DIFFERENCES FROM INITIAL SFT:
#   1. Starts from existing adapter checkpoint (resume_adapter_file)
#   2. Uses augmented training data (data/augmented → data/mlx_augmented)
#   3. Lower learning rate (3e-6 vs 1e-5) — we're refining, not relearning
#   4. Fewer iterations (500 vs 1000) — augmented data is more targeted
#   5. No warmup — the model is already in a good optimization region

# --- Model ---
model: "mlx-community/Llama-3.2-3B-Instruct-4bit"

# --- Data ---
# Uses augmented dataset with error_handling + extra no_tool + multi_tool reinforcement
data: "data/mlx_augmented"
processed_dir: "data/augmented"

# --- Task ---
train: true
fine_tune_type: "lora"

# --- LoRA Parameters (must match initial SFT for adapter compatibility) ---
lora_parameters:
  rank: 8
  dropout: 0.05
  scale: 20.0

# --- Training Hyperparameters ---
# WHY 500 ITERATIONS:
#   The augmented dataset adds ~800 examples to 2757 existing = ~3557 total.
#   500 iters × batch_size 2 = 1000 examples seen ≈ 0.28 epochs.
#   With a warm start from SFT, this is enough to learn the new behaviors
#   without overfitting or forgetting existing skills.
iters: 500
batch_size: 2

# WHY LR 3e-6:
#   3x lower than initial SFT (1e-5). We're fine-tuning an already
#   fine-tuned model — too high and we'll forget tool_selection/hallucination.
#   3e-6 is aggressive enough to learn new patterns while being gentle
#   enough to preserve existing capabilities.
learning_rate: 3.0e-6

# --- LR Schedule ---
# WHY COSINE WITHOUT WARMUP:
#   The model starts from a good region (SFT checkpoint). No need for
#   warmup — we can start learning immediately at the target LR.
lr_schedule:
  name: "cosine_decay"
  arguments: [3.0e-6, 500]
  warmup: 0
  warmup_init: 3.0e-6

# --- Checkpointing ---
save_every: 100
steps_per_report: 10
steps_per_eval: 50
val_batches: 10

# --- Memory ---
max_seq_length: 2048
grad_checkpoint: true
mask_prompt: true
seed: 42
num_layers: 16

# --- Output ---
# Save to a NEW directory (don't overwrite the initial SFT checkpoint)
adapter_path: "artifacts/sft_v2/adapters"
